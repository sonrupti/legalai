<!DOCTYPE html>
<html>

<head>
    <title>Legal AI Assistant</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #343541;
            color: white;
        }

        .chat-container {
            width: 70%;
            margin: auto;
            height: 90vh;
            display: flex;
            flex-direction: column;
        }

        h1 {
            text-align: center;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            padding: 15px;
            margin: 10px;
            border-radius: 8px;
        }

        .user {
            background: #444654;
        }

        .ai {
            background: #202123;
        }

        .input-area {
            display: flex;
            padding: 20px;
        }

        input {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
        }

        button {
            margin-left: 10px;
            padding: 15px 25px;
            background: #10a37f;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>

</head>


<body>

    <div class="chat-container">

        <h1>⚖️ Indian Legal AI</h1>


        <div id="chat"></div>


        <div class="input-area">

            <input id="question" placeholder="Ask a legal question..."
                onkeydown="if(event.key==='Enter') sendMessage()">

            <button onclick="sendMessage()">
                Send
            </button>

        </div>


    </div>


    <script>


        async function sendMessage() {

            let input = document.getElementById("question");

            let question = input.value.trim();


            if (question === "")
                return;


            let chat = document.getElementById("chat");


            // show user message

            chat.innerHTML += `
<div class="message user">
<b>You:</b><br>
${question}
</div>
`;

            input.value = "";


            chat.scrollTop = chat.scrollHeight;


            // send to FastAPI

            let response = await fetch(
                "http://127.0.0.1:8000/legal",
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        question: question
                    })
                }
            );


            let data = await response.json();


            // show AI answer

            chat.innerHTML += `
<div class="message ai">
<b>Legal AI:</b><br>
${data.answer.replace(/\n/g, "<br>")}
</div>
`;


            chat.scrollTop = chat.scrollHeight;

        }


    </script>


</body>

</html>
